<div class="head"></div>
<button onclick="change()">Click</button>
<style>
    .head {
        background-color: red;
        width: 100px;
        height: 100px;

    }
    #widthmax{
        width: 700px;
        height: 100px;
        transition: 2s ease-in-out;
    }
</style>

<script>

    var b = document.querySelector(".head");

    function change() {
        b.setAttribute("id","widthmax")
        b.style.backgroundColor = "green";
    }
    //    console.log(b);

</script>
